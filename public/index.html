<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Antigravity 2.0 Mobile Dashboard - Control your AI agent from anywhere">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Antigravity 2.0 — Mobile Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css?v=3.0">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-logo">
                <div class="splash-orbit">
                    <div class="orbit-ring ring-1"></div>
                    <div class="orbit-ring ring-2"></div>
                    <div class="orbit-ring ring-3"></div>
                    <div class="orbit-core"></div>
                </div>
            </div>
            <h1 class="splash-title">Antigravity<span class="version-badge">2.0</span></h1>
            <p class="splash-subtitle">Mobile Command Center</p>
            <div class="splash-loader">
                <div class="loader-bar"></div>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" class="app hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>
                            <circle cx="12" cy="12" r="8" stroke-dasharray="4 4"/>
                            <circle cx="12" cy="12" r="11" opacity="0.3"/>
                        </svg>
                    </div>
                    <span class="logo-text">Antigravity</span>
                    <span class="logo-version">2.0</span>
                </div>
                <button id="sidebar-close-btn" class="icon-btn" aria-label="Close sidebar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>

            <!-- Projects Section -->
            <div class="sidebar-section">
                <div class="section-header" style="display: flex; justify-content: space-between; align-items: center; padding-right: 8px;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                        </svg>
                        <span>Projects</span>
                    </div>
                    <button id="add-project-btn" class="icon-btn" aria-label="Add project" style="width: 24px; height: 24px; padding: 4px;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                    </button>
                </div>
                <div id="projects-list" class="nav-list">
                    <div class="loading-shimmer"></div>
                </div>
            </div>

            <!-- Conversations Section -->
            <div class="sidebar-section flex-grow">
                <div class="section-header">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <span>Conversations</span>
                    <span id="convo-count" class="badge">0</span>
                </div>
                <div id="conversations-list" class="nav-list scrollable">
                    <div class="loading-shimmer"></div>
                    <div class="loading-shimmer"></div>
                    <div class="loading-shimmer"></div>
                </div>
            </div>

            <!-- New Conversation Button -->
            <div class="sidebar-footer">
                <button id="new-convo-btn" class="btn btn-primary btn-full">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    New Conversation
                </button>
            </div>
        </aside>

        <!-- Sidebar Overlay -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <button id="menu-btn" class="icon-btn" aria-label="Open menu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <div class="top-bar-title">
                    <h1 id="page-title">Dashboard</h1>
                    <span id="page-subtitle" class="subtitle"></span>
                </div>
                <button id="artifacts-btn" class="icon-btn" aria-label="View Artifacts" title="View Artifacts" style="display: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </button>
                <button id="refresh-btn" class="icon-btn" aria-label="Refresh">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                    </svg>
                </button>
            </header>

            <!-- Views Container -->
            <div class="views-container">
                <!-- Dashboard View -->
                <section id="dashboard-view" class="view active">
                    <div class="dashboard-grid">
                        <div class="stat-card glass" id="stat-projects">
                            <div class="stat-icon projects-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                                </svg>
                            </div>
                            <div class="stat-info">
                                <span class="stat-value" id="total-projects">-</span>
                                <span class="stat-label">Projects</span>
                            </div>
                        </div>
                        <div class="stat-card glass" id="stat-conversations">
                            <div class="stat-icon convos-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                                </svg>
                            </div>
                            <div class="stat-info">
                                <span class="stat-value" id="total-conversations">-</span>
                                <span class="stat-label">Conversations</span>
                            </div>
                        </div>
                        <div class="stat-card glass" id="stat-status">
                            <div class="stat-icon status-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                                    <polyline points="22 4 12 14.01 9 11.01"/>
                                </svg>
                            </div>
                            <div class="stat-info">
                                <span class="stat-value status-online">Online</span>
                                <span class="stat-label">System Status</span>
                            </div>
                        </div>
                    </div>

                    <!-- Recent Conversations -->
                    <div class="section-block">
                        <h2 class="section-title">Recent Conversations</h2>
                        <div id="recent-conversations" class="conversation-cards">
                            <div class="loading-shimmer card-shimmer"></div>
                            <div class="loading-shimmer card-shimmer"></div>
                            <div class="loading-shimmer card-shimmer"></div>
                        </div>
                    </div>

                    <!-- Projects Overview -->
                    <div class="section-block">
                        <h2 class="section-title">Projects</h2>
                        <div id="projects-grid" class="projects-grid">
                            <div class="loading-shimmer card-shimmer"></div>
                            <div class="loading-shimmer card-shimmer"></div>
                        </div>
                    </div>

                    <!-- Model Quota -->
                    <div class="section-block">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                            <h2 class="section-title" style="margin-bottom: 0;">Model Quota</h2>
                            <label class="switch" title="Toggle Model Quota">
                              <input type="checkbox" id="quota-toggle">
                              <span class="slider round"></span>
                            </label>
                        </div>
                        <div id="model-quota-list" class="quota-list glass" style="display: none;">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </section>

                <!-- Chat View -->
                <section id="chat-view" class="view">
                    <div id="chat-messages" class="chat-messages">
                        <div class="chat-empty">
                            <div class="empty-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                                </svg>
                            </div>
                            <p>Select a conversation to view</p>
                        </div>
                    </div>
                    <div class="chat-input-bar">
                        <div class="chat-input-header">
                            <select id="chat-model-select" class="chat-model-select">
                                <option value="flash">Flash (Fast)</option>
                                <option value="pro" selected>Pro (Balanced)</option>
                                <option value="flash_lite">Flash Lite (Lightweight)</option>
                            </select>
                        </div>
                        <div class="input-wrapper">
                            <button id="attach-btn" class="attach-btn icon-btn" aria-label="Attach file">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                                </svg>
                            </button>
                            <input type="file" id="file-upload" multiple style="display: none;">
                            <textarea id="message-input" placeholder="Send a message..." rows="1" autocomplete="off"></textarea>
                            <button id="send-btn" class="send-btn" aria-label="Send message" disabled>
                                <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- New Conversation Modal -->
    <div id="new-convo-modal" class="modal-overlay hidden">
        <div class="modal glass">
            <div class="modal-header">
                <h2>New Conversation</h2>
                <button id="modal-close-btn" class="icon-btn" aria-label="Close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="new-convo-project">Project</label>
                    <select id="new-convo-project" class="form-select">
                        <option value="">Select a project...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="new-convo-model">Model</label>
                    <select id="new-convo-model" class="form-select">
                        <option value="flash">Flash (Fast)</option>
                        <option value="pro" selected>Pro (Balanced)</option>
                        <option value="flash_lite">Flash Lite (Lightweight)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="new-convo-prompt">Prompt</label>
                    <textarea id="new-convo-prompt" class="form-textarea" placeholder="What would you like Antigravity to do?" rows="4"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button id="modal-cancel-btn" class="btn btn-ghost">Cancel</button>
                <button id="modal-submit-btn" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                    </svg>
                    Launch
                </button>
            </div>
        </div>
    </div>

    <!-- New Project Modal -->
    <div id="new-project-modal" class="modal-overlay hidden">
        <div class="modal glass">
            <div class="modal-header">
                <h2>New Project</h2>
                <button id="project-modal-close-btn" class="icon-btn" aria-label="Close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="new-project-name">Project Name</label>
                    <input type="text" id="new-project-name" class="form-textarea" placeholder="e.g., My Awesome App" style="height: auto; padding: 10px;">
                </div>
                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 8px; font-size: 0.875rem; cursor: pointer; user-select: none;">
                        <input type="checkbox" id="new-project-create-folder" checked style="width: 16px; height: 16px; accent-color: var(--accent-primary);">
                        Create new folder in D:\Antigravity2.0
                    </label>
                </div>
                <div class="form-group" id="new-project-path-group" style="display: none;">
                    <label for="new-project-path">Custom Folder Path</label>
                    <input type="text" id="new-project-path" class="form-textarea" placeholder="e.g., D:\Projects\MyApp" style="height: auto; padding: 10px;">
                </div>
            </div>
            <div class="modal-footer">
                <button id="project-modal-cancel-btn" class="btn btn-ghost">Cancel</button>
                <button id="project-modal-submit-btn" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                    </svg>
                    Add Project
                </button>
            </div>
        </div>
    </div>

    <!-- Artifacts Modal -->
    <div id="artifacts-modal" class="modal-overlay hidden">
        <div class="modal glass" style="max-width: 600px; width: 95%; max-height: 80vh; display: flex; flex-direction: column;">
            <div class="modal-header">
                <h2>Artifacts</h2>
                <button id="artifacts-close-btn" class="icon-btn" aria-label="Close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="artifacts-list" style="overflow-y: auto; flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 12px;">
                <!-- Artifacts will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="app.js?v=3.0"></script>
</body>
</html>
